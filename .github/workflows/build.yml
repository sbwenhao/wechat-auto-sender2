name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Check project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== App Module ==="
        ls -la app/
        echo "=== Source Files ==="
        find app/src/main -type f | head -20

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: |
        echo "Starting Gradle build..."
        ./gradlew assembleRelease --no-daemon -v 2>&1
        BUILD_STATUS=$?
        echo "Build exit code: $BUILD_STATUS"
        echo "=== Checking build outputs ==="
        find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK output directory does not exist"
        exit $BUILD_STATUS

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/' )
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
